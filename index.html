<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEVEX Document Control Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e9eef2;
    font-family:Segoe UI,Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{

    width:400px;
    background:white;

    border-radius:10px;

    box-shadow:0px 10px 30px rgba(0,0,0,.2);

    padding:40px;

}

.logo{

    text-align:center;
    font-size:22px;
    color:#003366;
    font-weight:bold;
    margin-bottom:10px;

}

.subtitle{

    text-align:center;
    color:#666;
    margin-bottom:30px;

}

input{

    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;

}

button{

    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;

}

button:hover{

    background:#00509e;

}

.footer{

    text-align:center;
    margin-top:20px;
    color:#999;
    font-size:12px;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

🏢 DEVEX INCORPORATED

</div>

<div class="subtitle">

Document Control Portal

</div>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="location.href='dashboard.html'">

LOGIN

</button>

<div class="footer">

John Paul Ronulo Version 1.2

</div>

</div>

</body>

</html>
