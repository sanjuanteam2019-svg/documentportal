<script>

let documents = [];
let statusChart;

const params = new URLSearchParams(window.location.search);
const project = params.get("project");

if (!project) {
    alert("No project selected.");
    window.location.href = "projects.html";
}

const projectNames = {
    "government-center": "Government Center Project",
    "22-storey-multipurpose-building": "22-Storey Multipurpose Building",
    "school-cluster3": "School Cluster 3",
    "medical-center": "Medical Center",
    "evacuation-center": "San Juan Evacuation Center",
    "crematorium": "San Juan Crematorium"
};

document.getElementById("projectTitle").innerHTML =
    "📄 " + (projectNames[project] || "Document Register");

fetch(`./data/${project}.json`)
.then(response => {
    if (!response.ok) {
        throw new Error("Project database not found.");
    }
    return response.json();
})
.then(data => {

    documents = data;

    updateDashboard();
    displayDocuments(documents);

})
.catch(error => {
    console.error(error);
});

function updateDashboard(){

    document.getElementById("totalDocs").textContent =
        documents.length;

    document.getElementById("approvedDocs").textContent =
        documents.filter(d=>d.status==="Approved").length;

    document.getElementById("approvedAsCorrectedDocs").textContent =
        documents.filter(d=>d.status==="Approved As Corrected").length;

    document.getElementById("reviseResubmitDocs").textContent =
        documents.filter(d=>d.status==="Revise & Resubmit").length;

    document.getElementById("submittedDocs").textContent =
        documents.filter(d=>d.status==="Submitted").length;

    document.getElementById("draftDocs").textContent =
        documents.filter(d=>d.status==="Draft").length;

    document.getElementById("supersededDocs").textContent =
        documents.filter(d=>d.status==="Superseded").length;

    document.getElementById("overdueDocs").textContent =
        documents.filter(doc =>
            doc.status==="Submitted" &&
            doc.dueDate &&
            new Date().setHours(0,0,0,0) >
            new Date(doc.dueDate).setHours(0,0,0,0)
        ).length;

    updateChart();
}

function updateChart(){

    const counts = {
        approved: documents.filter(d=>d.status==="Approved").length,
        approvedCorrected: documents.filter(d=>d.status==="Approved As Corrected").length,
        revise: documents.filter(d=>d.status==="Revise & Resubmit").length,
        submitted: documents.filter(d=>d.status==="Submitted").length,
        draft: documents.filter(d=>d.status==="Draft").length,
        superseded: documents.filter(d=>d.status==="Superseded").length,
        overdue: documents.filter(doc =>
            doc.status==="Submitted" &&
            doc.dueDate &&
            new Date() > new Date(doc.dueDate)
        ).length
    };

    if(statusChart){
        statusChart.destroy();
    }

    statusChart = new Chart(
        document.getElementById("statusChart"),
        {
            type:"doughnut",
            data:{
                labels:[
                    "Approved",
                    "Approved As Corrected",
                    "Revise & Resubmit",
                    "Submitted",
                    "Draft",
                    "Superseded",
                    "Overdue"
                ],
                datasets:[{
                    data:[
                        counts.approved,
                        counts.approvedCorrected,
                        counts.revise,
                        counts.submitted,
                        counts.draft,
                        counts.superseded,
                        counts.overdue
                    ],
                    backgroundColor:[
                        "#16a34a",
                        "#FEBE1E",
                        "#FE0000",
                        "#765BFF",
                        "#D2591C",
                        "#D8E438",
                        "#dc2626"
                    ]
                }]
            }
        }
    );
}

function displayDocuments(list){

    const table = document.getElementById("tableBody");

    table.innerHTML = "";

    list.forEach(doc => {

        const isOverdue =
            doc.status === "Submitted" &&
            doc.dueDate &&
            new Date().setHours(0,0,0,0) >
            new Date(doc.dueDate).setHours(0,0,0,0);

        const displayStatus =
            isOverdue ? "Overdue" : doc.status;

        let statusClass="";

        if(doc.status==="Approved")
            statusClass="status-approved";
        else if(doc.status==="Approved As Corrected")
            statusClass="status-approvedAsCorrected";
        else if(doc.status==="Revise & Resubmit")
            statusClass="status-reviseResubmit";
        else if(isOverdue)
            statusClass="status-overdue";
        else if(doc.status==="Draft")
            statusClass="status-draft";
        else if(doc.status==="Superseded")
            statusClass="status-superseded";

        table.innerHTML += `
        <tr>
            <td>${doc.docNo || ""}</td>
            <td>${doc.category || ""}</td>
            <td>${doc.trade || ""}</td>
            <td>${doc.title || ""}</td>
            <td>${doc.revision || ""}</td>
            <td class="${statusClass}">
                ${displayStatus}
            </td>
            <td>${doc.date || ""}</td>
            <td>
                <a href="${doc.link}"
                   target="_blank"
                   class="view-btn">
                   View
                </a>
            </td>
        </tr>`;
    });

    document.getElementById("recordCount").innerHTML =
        `Total Documents : <b>${list.length}</b>`;
}

const search = document.getElementById("searchBox");
const status = document.getElementById("statusFilter");
const category = document.getElementById("categoryFilter");
const trade = document.getElementById("tradeFilter");
const sort = document.getElementById("sortFilter");

function filterDocuments(){

    const keyword = search.value.toLowerCase();

    let filtered = documents.filter(doc => {

        const isOverdue =
            doc.status==="Submitted" &&
            doc.dueDate &&
            new Date().setHours(0,0,0,0) >
            new Date(doc.dueDate).setHours(0,0,0,0);

        const matchText =
            (doc.docNo || "").toLowerCase().includes(keyword) ||
            (doc.title || "").toLowerCase().includes(keyword);

        const matchStatus =
            status.value==="" ||
            (status.value==="Overdue"
                ? isOverdue
                : doc.status===status.value);

        const matchCategory =
            category.value==="" ||
            doc.category===category.value;

        const matchTrade =
            trade.value==="" ||
            doc.trade===trade.value;

        return matchText &&
               matchStatus &&
               matchCategory &&
               matchTrade;
    });

    switch(sort.value){

        case "date-desc":
            filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
            break;

        case "date-asc":
            filtered.sort((a,b)=>new Date(a.date)-new Date(b.date));
            break;

        case "doc-asc":
            filtered.sort((a,b)=>a.docNo.localeCompare(b.docNo));
            break;

        case "doc-desc":
            filtered.sort((a,b)=>b.docNo.localeCompare(a.docNo));
            break;

        case "title-asc":
            filtered.sort((a,b)=>a.title.localeCompare(b.title));
            break;

        case "title-desc":
            filtered.sort((a,b)=>b.title.localeCompare(a.title));
            break;
    }

    displayDocuments(filtered);
}

search.addEventListener("keyup", filterDocuments);
status.addEventListener("change", filterDocuments);
category.addEventListener("change", filterDocuments);
trade.addEventListener("change", filterDocuments);
sort.addEventListener("change", filterDocuments);

</script>

</body>
</html>
